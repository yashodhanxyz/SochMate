version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://sochmate:sochmate@postgres:5432/sochmate
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  STOCKFISH_PATH: /usr/games/stockfish
  DEBUG: "true"
  CORS_ORIGINS: '["http://localhost:3000"]'

x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  volumes:
    - ./backend:/app   # mount source for hot-reload in dev
  depends_on:
    migrate:
      condition: service_completed_successfully
    redis:
      condition: service_healthy

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sochmate
      POSTGRES_PASSWORD: sochmate
      POSTGRES_DB: sochmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sochmate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Migration (runs once, then exits) ────────────────────────────────────

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head
    restart: "no"   # run-once; Compose marks it completed_successfully when it exits 0

  # ── Application ───────────────────────────────────────────────────────────

  api:
    <<: *backend-base
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    <<: *backend-base
    environment:
      <<: *backend-env
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
